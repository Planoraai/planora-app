repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix, --config, apps/api/pyproject.toml]
        files: ^(apps/api|packages)/
      - id: ruff-format
        args: [--config, apps/api/pyproject.toml]
        files: ^(apps/api|packages)/

  - repo: local
    hooks:
      - id: mypy-api
        name: mypy (apps/api + every packages/*)
        entry: python apps/api/scripts/mypy_backend.py
        language: system
        pass_filenames: false
        files: ^(apps/api|packages)/.*\.py$

      - id: pytest-api
        name: pytest (api + every packages/* test suite)
        entry: python apps/api/scripts/pytest_backend.py
        language: system
        pass_filenames: false
        files: ^(apps/api|packages)/
        stages: [pre-push]
