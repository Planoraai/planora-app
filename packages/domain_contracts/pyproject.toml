[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "travel-planner-domain-contracts"
version = "0.1.0"
description = "Pydantic schemas (TripBrief, Recommendations, LogisticsPlan, BudgetReport, Itinerary, RevisionRequest) — single source of truth shared across orchestrator, tools, agents, memory, and reliability layers."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.9",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
