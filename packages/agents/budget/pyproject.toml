[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "travel-planner-agent-budget"
version = "0.1.0"
description = "Budget planning agent: estimates per-category costs, flags outliers, and signals over/under-budget against the trip's stated cap."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.9",
    "travel-planner-domain-contracts",
    "travel-planner-orchestrator",
    "travel-planner-tools",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["agents*"]
namespaces = true

[tool.pytest.ini_options]
testpaths = ["tests"]
