[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "travel-planner-agent-repair"
version = "0.1.0"
description = "Repair-loop agent: feeds validator findings back into the right worker (destination/logistics/budget/synthesis) for a bounded number of revision passes."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.9",
    "travel-planner-domain-contracts",
    "travel-planner-orchestrator",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["agents*"]
namespaces = true

[tool.pytest.ini_options]
testpaths = ["tests"]
