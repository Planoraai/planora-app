[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "travel-planner-agent-logistics"
version = "0.1.0"
description = "Logistics planning agent: turns recommendations into a concrete stay/transit plan with intercity hops and daily transit notes."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.9",
    "travel-planner-domain-contracts",
    "travel-planner-orchestrator",
    "travel-planner-tools",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["agents*"]
namespaces = true

[tool.pytest.ini_options]
testpaths = ["tests"]
